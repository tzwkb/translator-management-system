<style>
  :root { --ink:#1d2125; --paper:#faf8f2; --slate:#eef3f8; --green:#4e9d4e; --green-d:#35703a;
    --blue:#6f9fc8; --blue-d:#3e6e96; --line:#d9e2ec; --muted:#6b7480; --warn:#d98a26; --danger:#c0453b; --yellow:#c9a227; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink); background:var(--paper); font-size:14px; }
  header { display:flex; align-items:center; gap:12px; padding:14px 24px; background:var(--slate); border-bottom:2px solid var(--green); }
  header img { height:34px; width:34px; border-radius:6px; object-fit:cover; }
  header h1 { font-size:17px; margin:0; font-weight:600; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--blue); color:#fff; }
  .role { margin-left:auto; display:flex; align-items:center; gap:7px; font-size:13px; color:var(--muted); }
  .role select { padding:5px 9px; border:1px solid var(--line); border-radius:6px; background:#fff; font-size:13px; }
  .rolehint { font-size:12px; padding:3px 9px; border-radius:10px; }
  .rolehint.ed { background:#e4f3e4; color:var(--green-d); }
  .rolehint.ag { background:#fdf6ec; color:var(--warn); }
  .rolehint.ro { background:#f7e2e0; color:var(--danger); }
  main { max-width:1180px; margin:20px auto; padding:0 24px; }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:18px; }
  .tab { padding:9px 18px; cursor:pointer; border:none; background:none; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab.on { color:var(--ink); font-weight:600; border-bottom-color:var(--green); }
  .cards { display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .card { background:#fff; border:1px solid var(--line); border-radius:9px; padding:13px 18px; min-width:118px; }
  .card .n { font-size:23px; font-weight:700; font-variant-numeric:tabular-nums; }
  .card .l { font-size:12px; color:var(--muted); margin-top:2px; }
  .card.alert { border-color:var(--warn); background:#fdf6ec; } .card.alert .n { color:var(--warn); }
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar input, .toolbar select { padding:8px 11px; border:1px solid var(--line); border-radius:7px; font-size:14px; background:#fff; }
  .toolbar input.search { flex:0 0 220px; }
  .count { color:var(--muted); font-size:13px; margin-right:auto; }
  button { font-family:inherit; font-size:14px; cursor:pointer; border:none; border-radius:7px; }
  .btn-primary { background:var(--green); color:#fff; padding:8px 16px; } .btn-primary:hover { background:var(--green-d); }
  .btn-ghost { background:none; color:var(--ink); padding:8px 14px; border:1px solid var(--line); }
  .btn-link { background:none; color:var(--blue-d); padding:4px 6px; } .btn-link:hover { text-decoration:underline; }
  .btn-link.danger { color:var(--danger); }
  table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { background:var(--slate); font-weight:600; font-size:13px; color:#41484f; }
  tbody tr:hover { background:#fbfdff; }
  .namebtn { background:none; color:var(--blue-d); font-weight:600; padding:0; font-size:14px; } .namebtn:hover { text-decoration:underline; }
  .pill { font-size:12px; padding:2px 9px; border-radius:11px; display:inline-block; }
  .s-Active,.st-已支付 { background:#e4f3e4; color:var(--green-d); }
  .s-Dormant,.st-未开票 { background:#ecedef; color:var(--muted); }
  .s-Blacklisted,.st-有争议 { background:#f7e2e0; color:var(--danger); }
  .s-Probation { background:#f6efd6; color:var(--yellow); }
  .st-已开票待付 { background:#e6eef7; color:var(--blue-d); }
  .sev-严重,.sev-极严重 { color:var(--danger); font-weight:600; } .sev-一般 { color:var(--warn); }
  .num { font-variant-numeric:tabular-nums; }
  .muted { color:var(--muted); }
  .expiry-warn,.amt-bad { color:var(--warn); font-weight:600; } .amt-bad { cursor:help; }
  .mask { position:fixed; inset:0; background:rgba(29,33,37,.45); display:none; align-items:flex-start; justify-content:center; padding-top:5vh; }
  .mask.open { display:flex; }
  .modal { background:var(--paper); border-radius:10px; width:620px; max-width:94vw; max-height:88vh; overflow:auto; box-shadow:0 12px 40px rgba(29,33,37,.3); }
  .modal.wide { width:760px; }
  .modal h2 { margin:0; padding:15px 22px; background:var(--slate); font-size:16px; border-bottom:1px solid var(--line); }
  .form { padding:16px 22px; display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; }
  .field { display:flex; flex-direction:column; gap:4px; } .field.full { grid-column:1 / 3; }
  .field label { font-size:12px; color:#41484f; } .field label .req { color:var(--danger); }
  .field input,.field select,.field textarea { padding:7px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px; font-family:inherit; background:#fff; }
  .field textarea { resize:vertical; min-height:46px; }
  .actions { padding:13px 22px; display:flex; justify-content:flex-end; gap:10px; border-top:1px solid var(--line); }
  .empty { text-align:center; color:var(--muted); padding:34px; }
  .summary { padding:14px 22px; display:flex; flex-wrap:wrap; gap:6px 22px; }
  .summary .kv { font-size:13px; } .summary .kv b { color:var(--muted); font-weight:500; margin-right:5px; }
  .subtab { flex-shrink:0; }
.subtabs { overflow-x:auto; display:flex; display:flex; gap:2px; padding:0 16px; background:var(--slate); border-top:1px solid var(--line); }
  .subtab { padding:8px 13px; cursor:pointer; border:none; background:none; font-size:13px; color:var(--muted); border-bottom:2px solid transparent; }
  .subtab.on { color:var(--ink); font-weight:600; border-bottom-color:var(--green); }
  #detailBody { padding:14px 22px; min-height:120px; }
  .mini { width:100%; border-collapse:collapse; margin-bottom:12px; }
  .mini th,.mini td { padding:7px 9px; font-size:13px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .mini th { background:#fff; color:var(--muted); font-weight:500; }
  .arrow { color:var(--green-d); }
  .addrow { display:flex; gap:8px; flex-wrap:wrap; align-items:end; background:#fbfdff; padding:10px; border-radius:7px; border:1px solid var(--line); }
  .addrow .field { gap:3px; } .addrow .field label { font-size:11px; }
  .addrow input,.addrow select { padding:6px 8px; font-size:13px; }
  .statussel { padding:3px 6px; border:1px solid var(--line); border-radius:5px; font-size:12px; background:#fff; }
  .secbox { background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px 16px; }
  .secbox .kv { font-size:13px; margin-bottom:6px; } .secbox .kv b { color:var(--muted); font-weight:500; margin-right:6px; }
  body.viewer .edit-only { display:none !important; }
  .toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 10px 16px; border-radius: 8px; color: #fff; font-size: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.15); transition: opacity .3s, transform .3s; max-width: 360px; }
  .toast.out { opacity: 0; transform: translateX(20px); }
  .toast.error { background: var(--danger, #c0392b); }
  .toast.success { background: var(--green-d, #2e7d32); }
  .toast.info { background: var(--ink, #2c3e50); }
  .grouphd { grid-column:1/-1; width:100%; font-weight:600; color:var(--green-d,#2e7d32); margin:10px 0 2px; border-top:1px solid var(--line,#eee); padding-top:8px; font-size:13px; }
  .kv-sec { grid-column:1/-1; flex-basis:100%; width:100%; font-size:12px; color:var(--muted,#888); margin-top:8px; border-top:1px dashed var(--line,#ddd); padding-top:6px; }
</style>
</head>

  <h1>译员管理系统</h1><span class="badge">Demo</span>
  <div class="role">视角
    <select id="role" onchange="switchRole()">
      <option value="资源端">资源端（可编辑）</option>
      <option value="财务">财务（可编辑）</option>
      <option value="资源端Agent">资源端Agent（代填·钱需审）</option>
      <option value="boss">boss（只读）</option>
    </select>
    <span id="roleHint" class="rolehint"></span>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab on" id="tab-tr" onclick="showTab('tr')">译员主表</button>
    <button class="tab" id="tab-po" onclick="showTab('po')">PO 结算</button>
    <button class="tab" id="tab-pending" onclick="showTab('pending')">待审核</button>
    <button class="tab" id="tab-audit" onclick="showTab('audit')">审计日志</button>
  </div>

  <section id="view-tr">
    <div class="cards" id="cards"></div>
    <div class="toolbar">
      <input class="search" id="search" placeholder="搜索姓名 / 语言对 / 项目">
      <span class="count" id="count"></span>
      <button class="btn-ghost" onclick="exportTr()">导出 Excel</button>
      <label class="btn-ghost edit-only" style="display:inline-block">导入 Excel<input type="file" accept=".xlsx" style="display:none" onchange="importTr(this)"></label>
      <label class="btn-ghost edit-only" style="display:inline-block">导入 LQE 报告<input type="file" accept=".xlsx" style="display:none" onchange="importLQE(this)"></label>
      <button class="btn-primary edit-only" onclick="openEdit()">+ 新增译员</button>
    </div>
    <table><thead><tr>
      <th>姓名</th><th>语言对</th><th>状态</th><th>评级</th><th>翻译费率</th><th>当前项目</th><th>档期</th><th>合同到期</th><th>最近联系</th><th>操作</th>
    </tr></thead><tbody id="rows"></tbody></table>
    <div class="empty" id="empty" style="display:none">没有匹配的译员</div>
  </section>

  <section id="view-po" style="display:none">
    <div class="cards" id="poCards"></div>
    <div class="toolbar">
      <select id="poMonth" onchange="loadPO()"></select>
      <select id="poStatus" onchange="loadPO()">
        <option value="">全部状态</option><option>未开票</option><option>已开票待付</option><option>已支付</option><option>有争议</option>
      </select>
      <span class="count" id="poCount"></span>
      <button class="btn-primary edit-only" onclick="openPO()">+ 新增 PO</button>
    </div>
    <table><thead><tr>
      <th>译员</th><th>结算月</th><th>项目</th><th>角色</th><th>字数(千)</th><th>单价</th><th>金额</th><th>币种</th><th>状态</th><th>PO 号</th>
    </tr></thead><tbody id="poRows"></tbody></table>
    <div class="empty" id="poEmpty" style="display:none">本月没有结算记录</div>
  </section>

  <section id="view-audit" style="display:none">
    <div class="toolbar"><span class="count" id="auditCount"></span></div>
    <table><thead><tr><th>时间</th><th>操作人</th><th>动作</th><th>对象</th><th>详情</th></tr></thead><tbody id="auditRows"></tbody></table>
    <div class="empty" id="auditEmpty" style="display:none">无记录或无权限</div>
  </section>

  <section id="view-pending" style="display:none">
    <div class="toolbar"><span class="count" id="pendCount"></span><span class="muted">agent 提交的钱相关改动，人工批准后才生效</span></div>
    <table><thead><tr><th>提交时间</th><th>来源</th><th>类型</th><th>译员</th><th>内容</th><th>操作</th></tr></thead><tbody id="pendRows"></tbody></table>
    <div class="empty" id="pendEmpty" style="display:none">没有待审，或无权限</div>
  </section>
</main>

<!-- 新增/编辑译员 -->
<div class="mask" id="editMask"><div class="modal"><h2 id="mTitle">新增译员</h2>
  <div class="form">
    <input type="hidden" id="f-id">
    <div class="grouphd">基础信息</div>
    <div class="field"><label>姓名 <span class="req">*</span></label><input id="f-name"></div>
    <div class="field"><label>母语 <span class="req">*</span></label><input id="f-native_language" placeholder="中文"></div>
    <div class="field"><label>入库日期 <span class="req">*</span></label><input id="f-onboarding_date" placeholder="2025-01-01"></div>
    <div class="field"><label>邮箱</label><input id="f-email"></div>
    <div class="field"><label>微信</label><input id="f-wechat"></div>
    <div class="field"><label>所在地</label><input id="f-location"></div>
    <div class="field"><label>时区</label><input id="f-timezone" placeholder="UTC+8"></div>
    <div class="field"><label>状态</label><select id="f-status"><option>Active</option><option>Dormant</option><option>Blacklisted</option><option>Probation</option></select></div>

    <div class="field"><label>试译结果</label><select id="f-trial_result"><option value="">—</option><option>Pass</option><option>Fail</option><option>Pending</option></select></div>
    <div class="grouphd">项目分配</div>
    <div class="field"><label>当前项目</label><input id="f-current_project"></div>
    <div class="field"><label>角色</label><select id="f-role"><option value="">—</option><option>翻译</option><option>审校</option><option>MTPE</option><option>LQA</option></select></div>
    <div class="field"><label>日产字数</label><input id="f-daily_output" type="number" step="100"></div>
    <div class="field"><label>是否双休</label><select id="f-weekend_off"><option value="">—</option><option value="true">是</option><option value="false">否</option></select></div>

    <div class="grouphd">财务信息</div>
    <div class="field"><label>结算币种</label><select id="f-currency"><option value="">—</option><option>CNY</option><option>USD</option><option>EUR</option></select></div>
    <div class="field"><label>支付方式</label><input id="f-payment_method" placeholder="银行转账/PayPal"></div>
    <div class="field"><label>开票类型</label><input id="f-invoice_type"></div>
    <div class="field"><label>扣税方式</label><input id="f-tax_deduction"></div>
    <div class="field"><label>合同状态</label><select id="f-contract_status"><option value="">—</option><option>有效</option><option>即将到期</option><option>已过期</option><option>无合同</option></select></div>
    <div class="field"><label>合同到期</label><input id="f-contract_expiry" placeholder="2026-12-31"></div>
    <div class="field"><label>NDA 签署</label><select id="f-nda_signed"><option value="">—</option><option value="true">是</option><option value="false">否</option></select></div>
    <div class="grouphd">绩效与沟通</div>
    <div class="field"><label>准时率（%）</label><input id="f-punctuality_rate" type="number" step="1"></div>
    <div class="field"><label>响应速度</label><select id="f-responsiveness"><option value="">—</option><option>快</option><option>一般</option><option>慢</option></select></div>
    <div class="field"><label>合作评级</label><select id="f-cooperation_rating"><option value="">—</option><option>优先合作</option><option>正常合作</option><option>谨慎合作</option><option>停止合作</option></select></div>
    <div class="field"><label>最近联系</label><input id="f-last_contact" placeholder="2026-06-20"></div>

</div></div>

<!-- 译员详情（多子表）-->
<div class="mask" id="detailMask"><div class="modal wide">
  <h2 id="dTitle">译员详情</h2>
  <div class="summary" id="dSummary"></div>
  <div class="subtabs" id="dSubtabs"></div>
  <div id="detailBody"></div>
  <div class="actions"><button class="btn-ghost" onclick="closeModal('detailMask')">关闭</button></div>
</div></div>

<!-- 新增 PO -->
<div class="mask" id="poMask"><div class="modal"><h2>新增 PO 结算行</h2>
  <div class="form">
    <div class="field"><label>译员 <span class="req">*</span></label><select id="p-translator_id"></select></div>
    <div class="field"><label>结算月 <span class="req">*</span></label><input id="p-settlement_month" placeholder="2026-06"></div>
    <div class="field"><label>项目</label><input id="p-project"></div>
    <div class="field"><label>角色</label><select id="p-role"><option>翻译</option><option>审校</option><option>MTPE</option><option>LQA</option><option>LQE</option><option>其他</option></select></div>
    <div class="field"><label>字数（字）/ 工时</label><input id="p-word_count" type="number" step="1"></div>
    <div class="field"><label>单价</label><input id="p-rate" type="number" step="1"></div>
    <div class="field"><label>币种</label><select id="p-currency"><option>CNY</option><option>USD</option><option>EUR</option></select></div>
    <div class="field"><label>状态</label><select id="p-status"><option>未开票</option><option>已开票待付</option><option>已支付</option><option>有争议</option></select></div>
    <div class="field"><label>PO 号</label><input id="p-po_number"></div>
    <div class="field"><label>备注</label><input id="p-remarks"></div>
    <div class="field full muted" style="font-size:12px">金额 = 字数 × 单价，保存时自动算。</div>
  </div>
  <div class="actions"><button class="btn-ghost" onclick="closeModal('poMask')">取消</button><button class="btn-primary" onclick="savePO()">保存</button></div>
</div></div>

<script>
const TRF = ["name","native_language","onboarding_date","email","wechat","location","timezone","status","source",
  "language_pairs","translation_rate","mtpe_rate","review_rate","lqa_rate","rate_confirmed_date","domains","text_types","cat_tools","internal_rating","trial_result",
  "current_project","role","daily_output","weekend_off","availability",
  "currency","payment_method","invoice_type","tax_deduction","contract_status","contract_expiry","nda_signed",
  "punctuality_rate","responsiveness","cooperation_rating","last_contact","remarks"];
let DATA=[], CUR=null, TOKEN="", ROLE="editor";

/* ---- 鉴权 ---- */
async function switchRole() {
  const user = document.getElementById("role").value;
  const hint = document.getElementById("roleHint");
  let d;
  try { d = await (await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user})})).json(); }
  catch (e) { TOKEN=""; ROLE="viewer"; document.body.classList.add("viewer"); hint.textContent="登录失败·只读"; hint.className="rolehint ro"; return; }
  TOKEN = d.token; ROLE = d.role;
  document.body.classList.toggle("viewer", ROLE === "viewer");
  if (ROLE === "viewer") { hint.textContent = "只读视角"; hint.className = "rolehint ro"; }
  else if (ROLE === "agent") { hint.textContent = "Agent · 费率/PO 改动进待审"; hint.className = "rolehint ag"; }
  else { hint.textContent = "可编辑"; hint.className = "rolehint ed"; }
  load();
}
function showToast(msg, type){
  const w = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = "toast " + (type || "info");
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(()=>{ t.classList.add("out"); setTimeout(()=>t.remove(), 300); }, 3200);
}

async function api(method, path, body) {
  const opt = {method, headers:{}};
  if (body !== undefined) { opt.headers["Content-Type"]="application/json"; opt.body=JSON.stringify(body); }
  if (TOKEN) opt.headers["Authorization"] = "Bearer " + TOKEN;
  const r = await fetch(path, opt);
  if (r.status === 403) { showToast("只读视角，无编辑权限（后端已拦截）", "error"); throw new Error("403"); }
  if (!r.ok) { showToast("操作失败：" + (await r.text()), "error"); throw new Error(r.status); }
  const ct = r.headers.get("content-type") || "";
  return ct.includes("json") ? r.json() : r;
}
const get = p => fetch(p).then(r => r.json());

/* ---- 标签 ---- */
function showTab(t) {
  ["tr","po","pending","audit"].forEach(x => {
    document.getElementById("view-"+x).style.display = x===t ? "" : "none";
    document.getElementById("tab-"+x).classList.toggle("on", x===t);
  });
  if (t==="po") loadPO();
  if (t==="pending") loadPending();
  if (t==="audit") loadAudit();
}

/* ---- 译员主表 ---- */
async function load() {
  const [ov, list] = await Promise.all([get("/api/overview"), get("/api/translators")]);
  DATA = list;
  document.getElementById("cards").innerHTML = `
    <div class="card"><div class="n">${ov.total}</div><div class="l">在册译员</div></div>
    <div class="card"><div class="n">${ov.active}</div><div class="l">活跃</div></div>
    <div class="card"><div class="n">${ov.dormant}</div><div class="l">休眠</div></div>
    <div class="card ${ov.expiring_30d?"alert":""}"><div class="n">${ov.expiring_30d}</div><div class="l">30 天内合同到期</div></div>`;
  render();
}
function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const rows = DATA.filter(t => !q || [t.name,t.language_pairs,t.current_project].some(v => (v||"").toLowerCase().includes(q)));
  document.getElementById("count").textContent = "共 " + rows.length + " 名译员";
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  document.getElementById("rows").innerHTML = rows.map(t => {
    const d = daysTo(t.contract_expiry), w = d!=null && d>=0 && d<=30;
    const exp = t.contract_expiry ? `<span class="${w?"expiry-warn":""}">${t.contract_expiry}${w?" ⚠":""}</span>` : m();
    return `<tr>
      <td><button class="namebtn" onclick="openDetail(${t.id})">${esc(t.name)}</button></td>
      <td>${esc(t.language_pairs)||m()}</td><td><span class="pill s-${t.status}">${statusZh(t.status)}</span></td>
      <td>${esc(t.internal_rating)||m()}</td><td class="num">${t.translation_rate??m()}</td>
      <td>${esc(t.current_project)||m()}</td><td>${esc(t.availability)||m()}</td><td>${exp}</td><td>${esc(t.last_contact)||m()}</td>
      <td><button class="btn-link edit-only" onclick="openEdit(${t.id})">编辑</button>
          <button class="btn-link danger edit-only" onclick='delTr(${t.id}, ${JSON.stringify(t.name)})'>删除</button></td>
    </tr>`;
  }).join("");
}
function m(){return "<span class=muted>—</span>";}
function daysTo(d){ if(!d) return null; const t=new Date(d+"T00:00:00"); if(isNaN(t)) return null; const n=new Date(); n.setHours(0,0,0,0); return Math.round((t-n)/86400000); }
function statusZh(s){ return {Active:"活跃",Dormant:"休眠",Blacklisted:"黑名单",Probation:"试用"}[s]||s; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function val(id){ const v=document.getElementById(id).value.trim(); return v===""?null:v; }
function num(id){ const v=document.getElementById(id).value.trim(); return v===""?null:Number(v); }
function fmt(n){ return (n||0).toLocaleString("zh-CN",{maximumFractionDigits:2}); }

function openEdit(id) {
  const t = id ? DATA.find(x=>x.id===id) : {};
  document.getElementById("mTitle").textContent = id ? "编辑译员" : "新增译员";
  document.getElementById("f-id").value = id || "";
  TRF.forEach(f => document.getElementById("f-"+f).value = t[f]!=null ? t[f] : "");
  if (!id) document.getElementById("f-status").value = "Active";
  document.getElementById("editMask").classList.add("open");
}
function closeModal(mk){ document.getElementById(mk).classList.remove("open"); }
async function saveTr() {
  const b = {}; TRF.forEach(f => { let v=document.getElementById("f-"+f).value.trim(); b[f]=v===""?null:v; });
  if (!b.name) { showToast("姓名必填", "error"); return; }
  if (!b.native_language) { showToast("母语必填", "error"); return; }
  if (!b.onboarding_date) { showToast("入库日期必填", "error"); return; }
  b.status = b.status||"Active";
  const id = document.getElementById("f-id").value;
  try { await api(id?"PUT":"POST", "/api/translators"+(id?"/"+id:""), b); closeModal("editMask"); load(); } catch(e){}
}
async function delTr(id, name) {
  if (!confirm("删除译员「"+name+"」？")) return;
  try { await api("DELETE","/api/translators/"+id); load(); } catch(e){}
}
function exportTr(){ window.location = "/api/export/translators"; }
async function importTr(input) {
  const f = input.files[0]; input.value=""; if (!f) return;
  const fd = new FormData(); fd.append("file", f);
  const r = await fetch("/api/import/translators", {method:"POST", headers:{"Authorization":"Bearer "+TOKEN}, body:fd});
  if (r.status===403) { showToast("只读视角，无导入权限", "error"); return; }
  if (!r.ok) { showToast("导入失败", "error"); return; }
  const d = await r.json(); showToast("已导入 " + d.imported + " 条", "success"); load();
}
async function importLQE(input) {
  const f=input.files[0]; input.value=""; if(!f) return;
  const fd=new FormData(); fd.append("file", f);
  const r=await fetch("/api/import/lqe",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd});
  if(r.status===403){showToast("只读视角，无导入权限", "error");return;}
  if(!r.ok){showToast("导入失败："+(await r.text()), "error");return;}
  const d=await r.json();
  showToast(`从 LQE 报告导入 ${d.imported} 条质量分（项目 ${d.project||"?"} / ${d.period}）`+(d.unmatched.length?`；${d.unmatched.length} 个子表未匹配：${d.unmatched.join("、")}`:""));
  load();
}

/* ---- 详情 + 子表 ---- */
const SUBS = [["lang","语言对"],["rate","报价变更"],["quality","质量记分"],["contracts","合同"],["payment","支付信息"],["complaints","客诉"],["capacity","产能"]];
function openDetail(id) {
  CUR = DATA.find(x=>x.id===id);
  document.getElementById("dTitle").textContent = CUR.name + " · 详情";
  const _kv = ([k,v]) => `<div class="kv"><b>${k}</b>${v==null||v===""?"—":esc(v)}</div>`;
  const _bool = b => b===true?"是":(b===false?"否":null);
  document.getElementById("dSummary").innerHTML =
    [["母语",CUR.native_language],["语言对",CUR.language_pairs],["入库日期",CUR.onboarding_date],
     ["状态",statusZh(CUR.status)],["评级",CUR.internal_rating],["来源",CUR.source],
     ["翻译费率",CUR.translation_rate],["MTPE费率",CUR.mtpe_rate],["审校费率",CUR.review_rate],
     ["当前项目",CUR.current_project],["角色",CUR.role],["档期",CUR.availability],
     ["币种",CUR.currency],["支付方式",CUR.payment_method],["合同状态",CUR.contract_status],
     ["合同到期",CUR.contract_expiry],["NDA",_bool(CUR.nda_signed)],["合作评级",CUR.cooperation_rating]
    ].map(_kv).join("")
    + `<div class="kv-sec">系统自动算 · 联动维护（只读）</div>`
    + [["最近QA分",CUR.recent_qa_score],["累计QA均分",CUR.cumulative_qa_score],["低错次数",CUR.low_error_count],
       ["低错率(/千字)",CUR.low_error_rate],["客诉次数",CUR.complaint_count],["累计扣款",CUR.deduction_total],
       ["谈判状态",CUR.negotiation_status],["最近谈价日",CUR.last_negotiation_date],["谈后费率",CUR.post_negotiation_rate],
       ["降幅%",CUR.rate_reduction_pct],["累计未付",CUR.cumulative_unpaid],["累计完成字数",CUR.cumulative_word_count]
      ].map(_kv).join("");
  document.getElementById("dSubtabs").innerHTML = SUBS.map(([k,l],idx) =>
    `<button class="subtab ${idx===0?"on":""}" data-k="${k}" onclick="showSub('${k}')">${l}</button>`).join("");
  showSub("lang");
  document.getElementById("detailMask").classList.add("open");
}
function showSub(k) {
  document.querySelectorAll("#dSubtabs .subtab").forEach(b => b.classList.toggle("on", b.dataset.k===k));
  ({lang:subLang, rate:subRate, quality:subQuality, contracts:subContracts, payment:subPayment, complaints:subComplaints, capacity:subCapacity}[k])();
}
function tbl(headers, bodyHtml) {
  return `<table class="mini"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead><tbody>${bodyHtml || `<tr><td colspan="${headers.length}" class="muted" style="padding:12px">暂无记录</td></tr>`}</tbody></table>`;
}
async function subLang() {
  const list = await get(`/api/translators/${CUR.id}/language-pairs`);
  const rows = list.map(c=>`<tr><td>${esc(c.source_lang)}</td><td>${esc(c.target_lang)}</td></tr>`).join("");
  document.getElementById("detailBody").innerHTML = tbl(["源","目标"], rows) + `
    <div class="addrow edit-only">
      <input id="la-src" style="width:70px" placeholder="ZH"> → <input id="la-tgt" style="width:70px" placeholder="EN">
      <button class="btn-primary" onclick="addLang()">添加</button>
    </div>`;
}
async function addLang() {
  const src = document.getElementById("la-src").value.trim();
  const tgt = document.getElementById("la-tgt").value.trim();
  if (!src||!tgt) return;
  await api("POST", `/api/translators/${CUR.id}/language-pairs`, {source_lang:src, target_lang:tgt});
  subLang(); CUR=DATA.find(x=>x.id===CUR.id); load();
}

async function subRate() {
  const list = await get(`/api/translators/${CUR.id}/rate-changes`);
  const rows = list.map(c=>`<tr><td>${esc(c.change_date)}</td><td>${esc(c.task_type)||"—"}</td><td>${c.original_rate??"—"} <span class="arrow">→</span> <b>${c.new_rate??"—"}</b></td><td>${esc(c.negotiator)||"—"}</td><td>${esc(c.reason)||"—"}</td><td>${esc(c.remarks)||"—"}</td></tr>`).join("");
  document.getElementById("detailBody").innerHTML = tbl(["日期","任务","费率变化","谈价人","原因","备注"], rows) + `
    <div class="addrow edit-only">
      <div class="field"><label>日期</label><input id="a-date" value="${today()}"></div>
      <div class="field"><label>任务</label><select id="a-task"><option>翻译</option><option>审校</option><option>MTPE</option><option>LQA</option><option>LQE</option><option>其他</option></select></div>
      <div class="field"><label>原费率</label><input id="a-orig" type="number" style="width:80px"></div>
      <div class="field"><label>新费率</label><input id="a-new" type="number" style="width:80px"></div>
      <div class="field"><label>谈价人</label><input id="a-nego" style="width:90px"></div>
      <div class="field"><label>原因</label><input id="a-reason" style="width:110px"></div>
      <button class="btn-primary" onclick="addRate()">添加调价</button>
    </div>`;
}
async function addRate() {
  const b = {change_date:val("a-date"), task_type:document.getElementById("a-task").value, original_rate:num("a-orig"), new_rate:num("a-new"), negotiator:val("a-nego"), reason:val("a-reason")};
  if (!b.change_date) { showToast("日期必填", "error"); return; }
  try { const res = await api("POST",`/api/translators/${CUR.id}/rate-changes`, b);
    if (res && res.pending) { showToast(res.msg || "已提交待人工审核", "info"); return; }
    if (b.task_type === "翻译") { await load(); CUR=DATA.find(x=>x.id===CUR.id); }
    subRate(); } catch(e){}
}
async function subQuality() {
  const list = await get(`/api/translators/${CUR.id}/quality`);
  const rows = list.map(c=>`<tr><td>${esc(c.evaluation_period)||"—"}</td><td>${esc(c.project)||"—"}</td><td>${esc(c.qa_type)||"—"}</td><td><b>${c.score??"—"}</b></td><td>${c.critical_errors}/${c.major_errors}/${c.minor_errors}</td><td>${esc(c.reviewer)||"—"}</td></tr>`).join("");
  document.getElementById("detailBody").innerHTML = tbl(["周期","项目","类型","评分","C/M/Minor","评审人"], rows) + `
    <div class="addrow edit-only">
      <div class="field"><label>周期</label><input id="q-period" value="${month()}" style="width:80px"></div>
      <div class="field"><label>项目</label><input id="q-project" style="width:100px"></div>
      <div class="field"><label>类型</label><select id="q-type"><option>终检</option><option>过程抽检</option><option>首件审核</option><option>仲裁</option></select></div>
      <div class="field"><label>评分</label><input id="q-score" type="number" style="width:70px"></div>
      <div class="field"><label>C</label><input id="q-c" type="number" value="0" style="width:50px"></div>
      <div class="field"><label>M</label><input id="q-m" type="number" value="0" style="width:50px"></div>
      <div class="field"><label>Minor</label><input id="q-mi" type="number" value="0" style="width:50px"></div>
      <div class="field"><label>评审人</label><input id="q-rev" style="width:80px"></div>
      <button class="btn-primary" onclick="addQuality()">添加</button>
    </div>`;
}
async function addQuality() {
  const b = {evaluation_period:val("q-period"), project:val("q-project"), qa_type:document.getElementById("q-type").value, score:num("q-score"), critical_errors:num("q-c")||0, major_errors:num("q-m")||0, minor_errors:num("q-mi")||0, reviewer:val("q-rev")};
  try { await api("POST",`/api/translators/${CUR.id}/quality`, b); subQuality(); } catch(e){}

function today(){ return new Date().toISOString().slice(0,10); }
function month(){ return new Date().toISOString().slice(0,7); }

/* ---- PO ---- */
async function loadPO() {
  const sel = document.getElementById("poMonth");
  if (!sel.options.length) {
    const all = await get("/api/po");
    const months = [...new Set(all.map(p=>p.settlement_month))].sort().reverse();
    sel.innerHTML = months.map(mo=>`<option>${mo}</option>`).join("") || "<option>2026-06</option>";
  }
  const month = sel.value, st = document.getElementById("poStatus").value;
  const [list, sum] = await Promise.all([
    get(`/api/po?month=${month}` + (st?`&status=${encodeURIComponent(st)}`:"")),
    get(`/api/po/summary?month=${month}`)]);
  document.getElementById("poCards").innerHTML = Object.entries(sum.by_currency).map(([c,v]) =>
    `<div class="card"><div class="n num">${fmt(v.unpaid)}</div><div class="l">${c} 待付</div></div>
     <div class="card"><div class="n num">${fmt(v.paid)}</div><div class="l">${c} 已付</div></div>`).join("")
    || `<div class="card"><div class="n">0</div><div class="l">本月无数据</div></div>`;
  document.getElementById("poCount").textContent = "共 " + list.length + " 行";
  document.getElementById("poEmpty").style.display = list.length ? "none" : "block";
  document.getElementById("poRows").innerHTML = list.map(p => {
    const amt = p.amount_ok ? `<span class="num">${fmt(p.amount)}</span>` : `<span class="num amt-bad" title="应为 ${fmt(p.expected_amount)}">${fmt(p.amount)} ⚠</span>`;
    const opts = ["未开票","已开票待付","已支付","有争议"].map(o=>`<option ${o===p.status?"selected":""}>${o}</option>`).join("");
    return `<tr><td>${esc(p.translator_name)}</td><td>${esc(p.settlement_month)}</td><td>${esc(p.project)||m()}</td><td>${esc(p.role)||m()}</td>
      <td class="num">${p.word_count??m()}</td><td class="num">${p.rate??m()}</td><td>${amt}</td><td>${esc(p.currency)}</td>
      <td><span class="pill st-${p.status}">${esc(p.status)}</span><select class="statussel edit-only" onchange="setPOStatus(${p.id},this.value)">${opts}</select></td>
      <td class="muted">${esc(p.po_number)||"—"}</td></tr>`;
  }).join("");
}
async function setPOStatus(id, status) { try { const res = await api("PUT",`/api/po/${id}/status`,{status}); if (res && res.pending) showToast(res.msg||"已提交待人工审核", "info"); loadPO(); } catch(e){ loadPO(); } }
function openPO() {
  document.getElementById("p-translator_id").innerHTML = DATA.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join("");
  document.getElementById("p-settlement_month").value = document.getElementById("poMonth").value || month().replace(/-\d\d$/, "-06");
  ["p-project","p-word_count","p-rate","p-po_number","p-remarks"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("poMask").classList.add("open");
}
async function savePO() {
  const b = {translator_id:Number(document.getElementById("p-translator_id").value), settlement_month:val("p-settlement_month"),
    project:val("p-project"), role:document.getElementById("p-role").value, word_count:num("p-word_count"), rate:num("p-rate"),
    currency:document.getElementById("p-currency").value, status:document.getElementById("p-status").value, po_number:val("p-po_number"), remarks:val("p-remarks")};
  if (!b.translator_id || !b.settlement_month) { showToast("译员和结算月必填", "error"); return; }
  try { const res = await api("POST","/api/po", b);
    if (res && res.pending) showToast(res.msg || "已提交待人工审核", "info");
    closeModal("poMask"); document.getElementById("poMonth").innerHTML=""; loadPO(); } catch(e){}
}

/* ---- 审计 ---- */
async function loadAudit() {
  let rows = [];
  try { rows = await api("GET","/api/audit"); } catch(e){ rows = []; }
  document.getElementById("auditCount").textContent = "最近 " + rows.length + " 条";
  document.getElementById("auditEmpty").style.display = rows.length ? "none" : "block";
  document.getElementById("auditRows").innerHTML = rows.map(a=>`<tr><td>${esc(a.created_at)}</td><td>${esc(a.user)||"—"}</td><td>${esc(a.action)}</td><td>${esc(a.entity)} ${a.entity_id??""}</td><td>${esc(a.detail)||"—"}</td></tr>`).join("");
}
async function loadPending() {
  let rows=[]; try { rows = await api("GET","/api/pending"); } catch(e){ rows=[]; }
  document.getElementById("pendCount").textContent = "待审 " + rows.length + " 条";
  document.getElementById("pendEmpty").style.display = rows.length ? "none" : "block";
  document.getElementById("pendRows").innerHTML = rows.map(p => {
    const kind = {rate_change:"报价变更", po:"PO 新增", po_status:"PO 改状态"}[p.kind] || p.kind;
    const d = p.payload; let c = "";
    if (p.kind==="rate_change") c = `${esc(d.task_type)} 新费率 ${d.new_rate}（${esc(d.reason)||"—"}）`;
    else if (p.kind==="po") c = `${esc(d.settlement_month)} ${esc(d.role)} ${d.word_count}×${d.rate} ${esc(d.currency)}`;
    else if (p.kind==="po_status") c = `PO#${d.pid} → ${esc(d.status)}`;
    return `<tr><td>${esc(p.created_at)}</td><td>${esc(p.created_by)}</td><td>${kind}</td><td>${esc(p.translator_name)||"—"}</td><td>${c}</td>
      <td><button class="btn-link" onclick="approvePend(${p.id})">批准</button><button class="btn-link danger" onclick="rejectPend(${p.id})">驳回</button></td></tr>`;
  }).join("");
}
async function approvePend(id){ try{ await api("POST",`/api/pending/${id}/approve`); loadPending(); load(); }catch(e){} }
async function rejectPend(id){ try{ await api("POST",`/api/pending/${id}/reject`); loadPending(); }catch(e){} }

document.getElementById("search").addEventListener("input", render);
switchRole();   // 默认以资源端登录并加载
